spring:
  application:
    name: vg-store

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://192.168.1.47:5432/db_store}
    username: ${DATASOURCE_USERNAME:dev_user}
    password: ${DATASOURCE_PASSWORD:dev_123}
    driver-class-name: ${DRIVER_CLASS_NAME:org.postgresql.Driver}

  jpa:
